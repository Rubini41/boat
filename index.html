<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Adhiparasakthi Engineering College</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#f0f2f5;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    width:420px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 4px 15px rgba(0,0,0,.2);
}

.logo{
    width:120px;
    margin-bottom:10px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:25px;
    font-size:16px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:25px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:#0055aa;
}
</style>
</head>

<body>

<div class="container">

<img src="collegelogo.jpg" class="logo" alt="College Logo">

<h2>Adhiparasakthi Engineering College</h2>

<form action="https://formspree.io/f/xjgqpzzj" method="POST">

<input
type="text"
name="process1"
placeholder="process"
required>

<input
type="text"
name="process2"
placeholder="process..."
required>

<button type="submit">Submit</button>

</form>

</div>

</html>
